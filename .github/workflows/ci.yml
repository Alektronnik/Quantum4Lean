name: Quantum4Lean CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build + Fuzz + Unitary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain leanprover/lean4:4.7.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Build
        run: lake build

      - name: Run tests
        run: ./build/bin/quantum4lean-test
